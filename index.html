<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankFit Pro | Elite Workout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-shadow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); }
        .star-gold { color: #fbbf24; filter: drop-shadow(0 0 8px #fbbf24); }
        
        /* Animasi halu untuk Rank Up */
        @keyframes rankPulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .animate-rank { animation: rankPulse 2s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <audio id="sfx-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="sfx-rankup" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>
    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div class="max-w-6xl mx-auto px-4 pt-6 md:pt-12 space-y-6">
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-orbitron text-cyan-500 tracking-tighter text-xl">RANKFIT <span class="text-white">PRO</span></h2>
            <button onclick="toggleMusic()" id="music-btn" class="glass-card p-3 rounded-full hover:bg-slate-800 transition">
                <span id="music-icon">🔈 Music Off</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card rounded-[2.5rem] p-8 text-center relative overflow-hidden neon-shadow">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl"></div>
                    
                    <img id="rank-icon" src="assets/Bronze.png" alt="Rank" class="w-48 h-48 mx-auto object-contain mb-6 drop-shadow-2xl">
                    
                    <p class="text-[10px] tracking-[0.5em] text-slate-500 font-bold uppercase">Current Tier</p>
                    <h1 id="display-rank" class="text-4xl font-black font-orbitron italic text-white mb-4">BRONZE III</h1>
                    
                    <div id="star-container" class="flex justify-center gap-2 text-2xl mb-6">
                        </div>

                    <div class="pt-6 border-t border-slate-800/50">
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Highest Reached</p>
                        <p id="highest-rank" class="font-orbitron text-cyan-400">-</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="flex items-center gap-4">
                    <h3 class="font-orbitron text-sm text-slate-400">DAILY MISSION CIRCUIT</h3>
                    <div class="h-[1px] flex-1 bg-slate-800"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-5 glass-card rounded-2xl flex justify-between items-center border-l-4 border-cyan-500">
                        <div><p class="font-bold">Push Up</p><p class="text-xs text-slate-500">30 Reps</p></div>
                        <button onclick="markTask('pushup', this)" class="px-5 py-2 bg-slate-800 rounded-xl font-bold text-sm hover:bg-cyan-600 transition-all">Done</button>
                    </div>

                    <div class="p-5 glass-card rounded-2xl flex justify-between items-center border-l-4 border-cyan-500">
                        <div><p class="font-bold">Pull Up</p><p class="text-xs text-slate-500">30 Reps</p></div>
                        <button onclick="markTask('pullup', this)" class="px-5 py-2 bg-slate-800 rounded-xl font-bold text-sm hover:bg-cyan-600 transition-all">Done</button>
                    </div>

                    <div class="md:col-span-2 p-6 glass-card rounded-2xl border-l-4 border-yellow-500 bg-yellow-500/5">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                            <div class="text-center md:text-left">
                                <p class="font-bold text-lg text-yellow-500">Plank Timer</p>
                                <p class="text-xs text-slate-400">Focus & Breathe • 3 Minutes</p>
                            </div>
                            <span id="timer-display" class="text-4xl font-orbitron text-yellow-500">03:00</span>
                        </div>
                        <div class="flex gap-3">
                            <button id="plank-ctrl" onclick="toggleTimer()" class="flex-1 bg-yellow-600 py-4 rounded-xl font-black hover:bg-yellow-500 transition-all">START PLANK</button>
                            <button onclick="resetTimer()" class="px-6 bg-slate-800 rounded-xl">↺</button>
                        </div>
                    </div>

                    <div class="p-5 glass-card rounded-2xl flex justify-between items-center border-l-4 border-cyan-500">
                        <div><p class="font-bold">Squat</p><p class="text-xs text-slate-500">30 Reps</p></div>
                        <button onclick="markTask('squat', this)" class="px-5 py-2 bg-slate-800 rounded-xl font-bold text-sm hover:bg-cyan-600 transition-all">Done</button>
                    </div>

                    <div class="p-5 glass-card rounded-2xl flex justify-between items-center border-l-4 border-cyan-500">
                        <div><p class="font-bold">Bench Dip</p><p class="text-xs text-slate-500">30 Reps</p></div>
                        <button onclick="markTask('benchdip', this)" class="px-5 py-2 bg-slate-800 rounded-xl font-bold text-sm hover:bg-cyan-600 transition-all">Done</button>
                    </div>
                </div>

                <div class="mt-8">
                    <button id="claim-star-btn" disabled onclick="processClaim()" 
                        class="w-full py-6 rounded-3xl bg-slate-800 text-slate-600 font-black text-2xl tracking-widest disabled:opacity-50 transition-all duration-700">
                        CLAIM STAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
